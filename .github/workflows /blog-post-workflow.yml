# =============================================================================
#  Auto-update "Latest Blog Posts" in your profile README from your dev.to feed.
#
#  WHERE THIS GOES:
#  In your  Arsh910  repo, create this exact path:
#      .github/workflows/blog-post-workflow.yml
#  (create the folders .github  then  workflows  inside it, then this file)
#
#  It runs every 6 hours and on manual trigger. It looks for the
#  <!-- BLOG-POST-LIST:START --> / <!-- BLOG-POST-LIST:END --> markers in your
#  README and fills the list between them. No further action needed from you.
# =============================================================================

name: Latest blog posts

on:
  schedule:
    # Runs every 6 hours (UTC). Adjust if you like.
    - cron: "0 */6 * * *"
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest dev.to posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dev.to/feed/arshdeep_palial_c966081e6"
          max_post_count: 5
